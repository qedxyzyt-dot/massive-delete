<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover">
  <title>Massive Delete Gmail — Open App</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f4f1; color: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 16px;
      padding: 40px 36px 36px; max-width: 480px; width: 100%;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .logo { width: 56px; height: 56px; margin-bottom: 18px; }
    h1 { font-size: 20px; font-weight: 800; color: #c0392b; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #737373; line-height: 1.5; margin-bottom: 24px; }

    /* ── Primary button ── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 15px 24px;
      background: #3367d6; color: #fff; font-size: 15px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(51,103,214,0.18);
    }
    .btn-primary:hover { background: #2a56b8; box-shadow: 0 4px 16px rgba(51,103,214,0.25); }
    .btn-primary svg { flex-shrink: 0; }

    /* ── Help section ── */
    .help { margin-top: 24px; border-top: 1px solid #eee; padding-top: 18px; }
    .help-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; color: #3367d6;
      font-size: 13px; font-weight: 600; cursor: pointer;
      padding: 6px 12px; border-radius: 6px; transition: background 0.15s;
    }
    .help-toggle:hover { background: #f0f4ff; }
    .help-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
    .help-toggle.open .arrow { transform: rotate(180deg); }
    .help-body { display: none; margin-top: 16px; text-align: left; }
    .help-body.open { display: block; }
    .help-body p { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 14px; }

    /* ── Steps ── */
    .steps { list-style: none; margin: 0 0 16px; padding: 0; }
    .steps li {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; font-size: 13px; color: #444; line-height: 1.5;
    }
    .steps li + li { border-top: 1px solid #f0f0f0; }
    .step-num {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: #3367d6; color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .steps kbd {
      display: inline-block; padding: 2px 6px; font-size: 11px;
      background: #f3f3f3; border: 1px solid #d0d0d0; border-radius: 4px;
      font-family: inherit; font-weight: 600; white-space: nowrap;
    }

    /* ── Copy row ── */
    .copy-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .copy-input {
      flex: 1; padding: 10px 12px; font-size: 11px; font-family: monospace;
      border: 1px solid #ddd; border-radius: 6px; background: #f9f9f9;
      color: #333; overflow: hidden; text-overflow: ellipsis;
    }
    .copy-btn {
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      background: #3367d6; color: #fff; border: none; border-radius: 6px;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .copy-btn:hover { background: #2a56b8; }
    .copy-btn.copied { background: #137333; }

    .note { font-size: 11px; color: #aaa; margin-top: 16px; line-height: 1.4; }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      body { padding: 16px; }
      .card {
        padding: 28px 20px 24px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      }
      h1 { font-size: 18px; }
      .subtitle { font-size: 14px; margin-bottom: 20px; }
      .btn-primary {
        padding: 16px 20px;
        font-size: 16px;
        min-height: 52px;
        border-radius: 10px;
      }
      .help-toggle {
        font-size: 14px;
        padding: 10px 14px;
        min-height: 44px;
      }
      .help-body p { font-size: 14px; }
      .steps li { font-size: 14px; padding: 12px 0; }
      .step-num { width: 28px; height: 28px; font-size: 13px; }
      .copy-row { flex-direction: column; gap: 8px; }
      .copy-input {
        font-size: 12px;
        padding: 12px;
        min-height: 44px;
        text-overflow: ellipsis;
      }
      .copy-btn {
        padding: 12px 18px;
        font-size: 14px;
        min-height: 44px;
        width: 100%;
      }
      .note { font-size: 12px; }
    }

    @media (max-width: 380px) {
      body { padding: 12px; }
      .card { padding: 22px 16px 20px; }
      h1 { font-size: 17px; }
      .btn-primary { font-size: 15px; }
    }

    /* Prevent iOS zoom on input focus */
    @media (max-width: 768px) {
      input, textarea, select, button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../logo_official.svg" alt="Massive Delete Gmail">
    <h1 id="title">Open Massive Delete Gmail</h1>
    <p class="subtitle" id="subtitle">Click below to open the app. Google will ask you to sign in if needed.</p>

    <a class="btn-primary" id="btnOpen" href="#">
      <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span id="btnOpenText">Open App</span>
    </a>

    <!-- ── Help section ── -->
    <div class="help">
      <button class="help-toggle" id="helpToggle" onclick="toggleHelp()">
        <span id="helpLabel">Having trouble opening?</span>
        <span class="arrow">&#x25BC;</span>
      </button>
      <div class="help-body" id="helpBody">
        <p id="helpDesc">If you have multiple Google accounts and the button above shows an error, follow these steps:</p>

        <div class="copy-row">
          <input type="text" class="copy-input" id="copyInput" readonly>
          <button class="copy-btn" id="copyBtn" onclick="doCopy()"><span id="copyBtnText">Copy link</span></button>
        </div>

        <ol class="steps" id="stepsList"></ol>

        <p id="helpNote" style="font-size:12px;color:#888;text-align:center;margin:0;"></p>
      </div>
    </div>

    <p class="note" id="noteText">Powered by Google Apps Script. We never see your password.</p>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       CONFIG — Direct link to Apps Script web app.
       Google handles auth/account selection natively.
       ═══════════════════════════════════════════════════ */
    var DEPLOY_ID = 'AKfycbyVQc93W-yMTAvOW-GhNwmMjtMuxGLW-jB4GFRlDBu3tq8GB2rqXWtCTTYhcEXatdTl8w';
    var APP_URL   = 'https://script.google.com/macros/s/' + DEPLOY_ID + '/exec';

    document.getElementById('btnOpen').href = APP_URL;
    document.getElementById('copyInput').value = APP_URL;

    /* ═══════════════════════════════════════════════════
       HELPERS
       ═══════════════════════════════════════════════════ */
    function toggleHelp() {
      document.getElementById('helpToggle').classList.toggle('open');
      document.getElementById('helpBody').classList.toggle('open');
    }

    function doCopy() {
      var inp = document.getElementById('copyInput');
      inp.select();
      navigator.clipboard.writeText(inp.value).then(function() {
        var b = document.getElementById('copyBtn');
        b.classList.add('copied');
        document.getElementById('copyBtnText').textContent = '\u2713 ' + (t.copied || 'Copied!');
        setTimeout(function() {
          b.classList.remove('copied');
          document.getElementById('copyBtnText').textContent = t.copyBtn || 'Copy link';
        }, 2500);
      });
    }

    /* ═══════════════════════════════════════════════════
       i18n
       ═══════════════════════════════════════════════════ */
    var isMac = /Mac|iPhone|iPad/.test(navigator.platform || '');
    var shortcut = isMac ? 'Cmd+Shift+N' : 'Ctrl+Shift+N';

    var lang = (navigator.language || '').slice(0, 2);
    var i18n = {
      pt: {
        title: 'Abrir Massive Delete Gmail',
        subtitle: 'Clique abaixo para abrir o app. O Google pedir\u00e1 login se necess\u00e1rio.',
        btnOpen: 'Abrir App',
        helpLabel: 'Erro ao abrir? Veja como resolver',
        helpDesc: 'Se voc\u00ea usa v\u00e1rias contas Google e o bot\u00e3o acima d\u00e1 erro, siga estes passos:',
        steps: [
          'Clique em <strong>\u201cCopiar link\u201d</strong> acima.',
          'Abra uma <strong>janela an\u00f4nima</strong> no navegador (<kbd>' + shortcut + '</kbd>).',
          'Cole o link na barra de endere\u00e7os e pressione Enter.',
          'Fa\u00e7a login com a conta Gmail desejada \u2014 <strong>suas outras contas n\u00e3o ser\u00e3o desconectadas</strong>.'
        ],
        helpNote: 'Funciona sempre, independente de quantas contas voc\u00ea tem.',
        note: 'Powered by Google Apps Script. Nunca vemos sua senha.',
        copyBtn: 'Copiar link', copied: 'Copiado!'
      },
      en: {
        title: 'Open Massive Delete Gmail',
        subtitle: 'Click below to open the app. Google will ask you to sign in if needed.',
        btnOpen: 'Open App',
        helpLabel: 'Having trouble opening?',
        helpDesc: 'If you have multiple Google accounts and the button above shows an error, follow these steps:',
        steps: [
          'Click <strong>\u201cCopy link\u201d</strong> above.',
          'Open an <strong>incognito window</strong> in your browser (<kbd>' + shortcut + '</kbd>).',
          'Paste the link in the address bar and press Enter.',
          'Sign in with your desired Gmail account \u2014 <strong>your other accounts won\u2019t be signed out</strong>.'
        ],
        helpNote: 'This always works, regardless of how many accounts you have.',
        note: 'Powered by Google Apps Script. We never see your password.',
        copyBtn: 'Copy link', copied: 'Copied!'
      },
      es: {
        title: 'Abrir Massive Delete Gmail',
        subtitle: 'Haga clic para abrir la app. Google le pedir\u00e1 iniciar sesi\u00f3n si es necesario.',
        btnOpen: 'Abrir App',
        helpLabel: '\u00bfError al abrir? Vea c\u00f3mo resolverlo',
        helpDesc: 'Si usa varias cuentas de Google y el bot\u00f3n de arriba da error, siga estos pasos:',
        steps: [
          'Haga clic en <strong>\u201cCopiar enlace\u201d</strong> arriba.',
          'Abra una <strong>ventana de inc\u00f3gnito</strong> en su navegador (<kbd>' + shortcut + '</kbd>).',
          'Pegue el enlace en la barra de direcciones y presione Enter.',
          'Inicie sesi\u00f3n con la cuenta Gmail deseada \u2014 <strong>sus otras cuentas no se desconectar\u00e1n</strong>.'
        ],
        helpNote: 'Siempre funciona, sin importar cu\u00e1ntas cuentas tenga.',
        note: 'Powered by Google Apps Script. Nunca vemos su contrase\u00f1a.',
        copyBtn: 'Copiar enlace', copied: '\u00a1Copiado!'
      }
    };

    var t = i18n[lang] || i18n['en'];
    document.getElementById('title').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('btnOpenText').textContent = t.btnOpen;
    document.getElementById('helpLabel').textContent = t.helpLabel;
    document.getElementById('helpDesc').textContent = t.helpDesc;
    document.getElementById('helpNote').textContent = t.helpNote;
    document.getElementById('noteText').textContent = t.note;
    document.getElementById('copyBtnText').textContent = t.copyBtn;

    /* Build steps */
    var ol = document.getElementById('stepsList');
    t.steps.forEach(function(text, i) {
      var li = document.createElement('li');
      li.innerHTML = '<span class="step-num">' + (i + 1) + '</span><span>' + text + '</span>';
      ol.appendChild(li);
    });
  </script>
</body>
</html>
